    .btn-primary{display:inline-flex;align-items:center;gap:.45rem;background:var(--gold);color:var(--navy);font-weight:800;font-size:.88rem;padding:.8rem 1.5rem;border-radius:var(--rs);text-decoratio[...]

    .esb-val{font-family:'DM Serif Display',serif;font-size:1.8rem;color:var(--navy);line-height:1;margin-bottom:.2rem}

      .svc-grid{grid-template-columns:1fr}
      .nav-links li:not(:last-child){display:none}
      .hero-actions{flex-direction:column}
      .why-grid{grid-template-columns:1fr}
    }
    @media(prefers-reduced-motion:reduce){
      .fu,.sk-fill,.kpi-bar{transition:none}
      .hero-avail::before{animation:none}
    }
